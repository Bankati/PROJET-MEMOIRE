name: CI/CD

on:
  push:
    branches: [dev, staging, main]
  pull_request:
    branches: [dev, staging, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  # ── 1. QUALITÉ DU CODE ────────────────────────────────────────────────────
  quality:
    name: 🔍 Qualité du code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run type-check
      - run: npm run lint
      - run: npm run format:check

  # ── 2. VARIABLES D'ENVIRONNEMENT ─────────────────────────────────────────
  validate-env:
    name: 🔐 Variables d'environnement
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Vérifier les secrets
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          MISSING=0
          for VAR in DATABASE_URL SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY AUTH_SECRET \
                     COHERE_API_KEY OPENAI_API_KEY; do
            if [ -z "${!VAR}" ]; then
              echo "❌ Secret manquant : $VAR"
              MISSING=1
            else
              echo "✅ $VAR"
            fi
          done
          [ $MISSING -eq 0 ] || exit 1

  # ── 3. TESTS UNITAIRES ───────────────────────────────────────────────────
  unit-tests:
    name: 🧪 Tests unitaires
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Tests avec couverture
        run: npm run test:ci
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      - uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ github.sha }}
          path: coverage/
          retention-days: 7

  # ── 4. AUDIT DE SÉCURITÉ ─────────────────────────────────────────────────
  security:
    name: 🔒 Audit de sécurité
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: NPM Audit
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: true
      - name: Vulnérabilités connues sans correctif
        run: |
          echo "⚠️  HIGH sans fix : next (GHSA-q4gf-8mx6-v5v3) + xlsx (GHSA-4r6h-8v6p-xvw6)"
          npm audit --audit-level=high 2>&1 | grep -E "(high|critical)" || true
      - name: Détection de secrets (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

  # ── 5. BUILD ─────────────────────────────────────────────────────────────
  build:
    name: 🏗️ Build Next.js
    runs-on: ubuntu-latest
    needs: [quality, unit-tests, validate-env, security]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Restaurer le cache Next.js
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**/*.{ts,tsx,css}') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-
            ${{ runner.os }}-nextjs-
      - run: npm ci
      - name: Build
        run: npx next build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      - name: Statistiques du bundle
        run: |
          du -sh .next/ 2>/dev/null || true
          find .next/static/chunks -name "*.js" -exec du -sh {} \; 2>/dev/null | sort -rh | head -10 || true

