name: CI/CD

on:
  push:
    branches: [dev, staging, main]
  pull_request:
    branches: [dev, staging, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  # ── 1. QUALITÉ DU CODE ────────────────────────────────────────────────────
  quality:
    name: 🔍 Qualité du code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run type-check
      - run: npm run lint
      - run: npm run format:check

  # ── 2. VARIABLES D'ENVIRONNEMENT ─────────────────────────────────────────
  validate-env:
    name: 🔐 Variables d'environnement
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Vérifier les secrets
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          MISSING=0
          for VAR in DATABASE_URL SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY AUTH_SECRET \
                     COHERE_API_KEY OPENAI_API_KEY VERCEL_PROJECT_ID; do
            if [ -z "${!VAR}" ]; then
              echo "❌ Secret manquant : $VAR"
              MISSING=1
            else
              echo "✅ $VAR"
            fi
          done
          [ $MISSING -eq 0 ] || exit 1

  # ── 3. TESTS UNITAIRES ───────────────────────────────────────────────────
  unit-tests:
    name: 🧪 Tests unitaires
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Tests avec couverture
        run: npm run test:ci
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      - uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ github.sha }}
          path: coverage/
          retention-days: 7

  # ── 4. AUDIT DE SÉCURITÉ ─────────────────────────────────────────────────
  security:
    name: 🔒 Audit de sécurité
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: NPM Audit
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: true
      - name: Vulnérabilités connues sans correctif
        run: |
          echo "⚠️  HIGH sans fix : next (GHSA-q4gf-8mx6-v5v3) + xlsx (GHSA-4r6h-8v6p-xvw6)"
          npm audit --audit-level=high 2>&1 | grep -E "(high|critical)" || true
      - name: Détection de secrets (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

  # ── 5. BUILD ─────────────────────────────────────────────────────────────
  build:
    name: 🏗️ Build Next.js
    runs-on: ubuntu-latest
    needs: [quality, unit-tests, validate-env, security]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Restaurer le cache Next.js
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**/*.{ts,tsx,css}') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-
            ${{ runner.os }}-nextjs-
      - run: npm ci
      - name: Build
        run: npx next build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      - name: Statistiques du bundle
        run: |
          du -sh .next/ 2>/dev/null || true
          find .next/static/chunks -name "*.js" -exec du -sh {} \; 2>/dev/null | sort -rh | head -10 || true

  # ── 6. DÉPLOIEMENT STAGING ───────────────────────────────────────────────
  # Déclenché uniquement sur push vers staging
  deploy-staging:
    name: 🚀 Déploiement Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    outputs:
      deploy_url: ${{ steps.vercel.outputs.deploy_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Installer Vercel CLI
        run: npm install -g vercel@latest
      - name: Déployer sur Vercel (preview)
        id: vercel
        run: |
          DEPLOY_URL=$(vercel deploy --yes 2>&1 | grep "https://" | grep -v "Inspect" | tail -1)
          echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "✅ URL staging : $DEPLOY_URL"
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ── 7. SMOKE TESTS STAGING ───────────────────────────────────────────────
  smoke-test-staging:
    name: 💨 Smoke Tests Staging
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: needs.deploy-staging.outputs.deploy_url != ''
    steps:
      - name: Attendre la disponibilité (max 3min)
        run: |
          URL="${{ needs.deploy-staging.outputs.deploy_url }}"
          for i in {1..12}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" 2>/dev/null || echo "000")
            echo "Tentative $i/12 — HTTP $STATUS"
            if [[ "$STATUS" == "200" || "$STATUS" == "301" || "$STATUS" == "308" ]]; then
              echo "✅ Staging disponible"; break
            fi
            [ $i -eq 12 ] && { echo "❌ Staging indisponible après 3min"; exit 1; }
            sleep 15
          done
      - name: Health check /
        run: |
          URL="${{ needs.deploy-staging.outputs.deploy_url }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          echo "/ → HTTP $STATUS"
          [[ "$STATUS" == "200" || "$STATUS" == "308" ]] || { echo "❌ Homepage inaccessible"; exit 1; }
      - name: Health check /login
        run: |
          URL="${{ needs.deploy-staging.outputs.deploy_url }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/login")
          echo "/login → HTTP $STATUS"
          [ "$STATUS" = "200" ] || { echo "❌ /login inaccessible"; exit 1; }

  # ── 8. TESTS E2E ─────────────────────────────────────────────────────────
  # Déclenché uniquement sur staging, après les smoke tests
  e2e-tests:
    name: 🎭 Tests E2E
    runs-on: ubuntu-latest
    needs: [smoke-test-staging, deploy-staging]
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Installer Playwright (Chromium)
        run: npx playwright install --with-deps chromium
      - name: Tests E2E
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.deploy-staging.outputs.deploy_url }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.sha }}
          path: playwright-report/
          retention-days: 7

  # ── 9. DÉPLOIEMENT PRODUCTION ────────────────────────────────────────────
  # Déclenché uniquement sur push vers main
  deploy-production:
    name: 🚀 Déploiement Production
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      deploy_url: ${{ steps.vercel.outputs.deploy_url }}
      deploy_status: ${{ steps.vercel.outputs.deploy_status }}
    steps:
      - uses: actions/checkout@v4
      - name: Installer Vercel CLI
        run: npm install -g vercel@latest
      - name: Déployer en production sur Vercel
        id: vercel
        run: |
          DEPLOY_OUTPUT=$(vercel deploy --prod --yes 2>&1)
          echo "$DEPLOY_OUTPUT"
          DEPLOY_URL=$(echo "$DEPLOY_OUTPUT" | grep "https://" | grep -v "Inspect" | tail -1)
          echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "deploy_status=success" >> $GITHUB_OUTPUT
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ── 10. SMOKE TESTS PRODUCTION ───────────────────────────────────────────
  smoke-test-production:
    name: 💨 Smoke Tests Production
    runs-on: ubuntu-latest
    needs: deploy-production
    if: needs.deploy-production.outputs.deploy_status == 'success'
    steps:
      - name: Attendre la stabilisation (max 5min)
        run: |
          URL="${{ needs.deploy-production.outputs.deploy_url }}"
          for i in {1..20}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" 2>/dev/null || echo "000")
            echo "Tentative $i/20 — HTTP $STATUS"
            if [[ "$STATUS" == "200" || "$STATUS" == "301" || "$STATUS" == "308" ]]; then
              echo "✅ Production disponible"; break
            fi
            [ $i -eq 20 ] && { echo "❌ Production non disponible après 5min"; exit 1; }
            sleep 15
          done
      - name: Health check /
        run: |
          URL="${{ needs.deploy-production.outputs.deploy_url }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          echo "/ → HTTP $STATUS"
          [[ "$STATUS" == "200" || "$STATUS" == "308" ]] || { echo "❌ Homepage inaccessible"; exit 1; }
      - name: Health check /login
        run: |
          URL="${{ needs.deploy-production.outputs.deploy_url }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/login")
          echo "/login → HTTP $STATUS"
          [ "$STATUS" = "200" ] || { echo "❌ /login inaccessible"; exit 1; }
      - name: Health check API auth
        run: |
          URL="${{ needs.deploy-production.outputs.deploy_url }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/api/auth/session")
          echo "/api/auth/session → HTTP $STATUS"
          [ "$STATUS" != "000" ] || { echo "❌ API auth inaccessible"; exit 1; }
      - name: Headers de sécurité
        run: |
          URL="${{ needs.deploy-production.outputs.deploy_url }}"
          HEADERS=$(curl -sI "$URL")
          echo "$HEADERS"
          echo "$HEADERS" | grep -qi "x-frame-options" \
            && echo "✅ X-Frame-Options présent" || echo "⚠️ X-Frame-Options manquant"
          echo "$HEADERS" | grep -qi "x-content-type-options" \
            && echo "✅ X-Content-Type-Options présent" || echo "⚠️ X-Content-Type-Options manquant"

  # ── 11. RÉSUMÉ DÉPLOIEMENT PRODUCTION ────────────────────────────────────
  summary:
    name: 📣 Résumé
    runs-on: ubuntu-latest
    needs: [deploy-production, smoke-test-production]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Résumé dans GitHub Actions
        run: |
          if [[ "${{ needs.smoke-test-production.result }}" == "success" ]]; then
            echo "## ✅ Déploiement en production réussi" >> $GITHUB_STEP_SUMMARY
            echo "| Étape | Statut |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|" >> $GITHUB_STEP_SUMMARY
            echo "| 🔍 Qualité | ✅ |" >> $GITHUB_STEP_SUMMARY
            echo "| 🧪 Tests | ✅ |" >> $GITHUB_STEP_SUMMARY
            echo "| 🔒 Sécurité | ✅ |" >> $GITHUB_STEP_SUMMARY
            echo "| 🏗️ Build | ✅ |" >> $GITHUB_STEP_SUMMARY
            echo "| 🚀 Vercel | ✅ |" >> $GITHUB_STEP_SUMMARY
            echo "| 💨 Smoke Tests | ✅ |" >> $GITHUB_STEP_SUMMARY
            echo "**Commit :** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
            echo "**Par :** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Échec du déploiement en production" >> $GITHUB_STEP_SUMMARY
            echo "**Commit :** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
            echo "### Rollback : Vercel dashboard → dernier déploiement stable → Promote to Production" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
