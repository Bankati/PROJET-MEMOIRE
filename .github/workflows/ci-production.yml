name: CI/CD — Production

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Ne jamais annuler un déploiement de production en cours
concurrency:
  group: ci-production-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── 1. QUALITÉ DU CODE (STRICT) ───────────────────────────────────────
  quality:
    name: 🔍 Qualité du code (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run type-check
      - run: npm run lint
      - run: npm run format:check

  # ── 2. VALIDATION DES VARIABLES D'ENVIRONNEMENT ───────────────────────
  validate-env:
    name: 🔐 Variables d'environnement
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Vérifier tous les secrets de production
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          NEXT_PUBLIC_APP_URL_PROD: ${{ secrets.NEXT_PUBLIC_APP_URL }}
        run: |
          MISSING=0
          for VAR in DATABASE_URL SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY AUTH_SECRET \
                     GOOGLE_API_KEY ANTHROPIC_API_KEY VERCEL_TOKEN VERCEL_ORG_ID \
                     VERCEL_PROJECT_ID NEXT_PUBLIC_APP_URL_PROD; do
            if [ -z "${!VAR}" ]; then
              echo "❌ Secret de production manquant : $VAR"
              MISSING=1
            else
              echo "✅ $VAR"
            fi
          done
          [ $MISSING -eq 0 ] || exit 1

  # ── 3. TESTS UNITAIRES (seuil couverture obligatoire) ─────────────────
  unit-tests:
    name: 🧪 Tests unitaires (couverture > 70%)
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Exécuter les tests avec couverture stricte
        run: npm run test:ci
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEXT_TELEMETRY_DISABLED: 1

      - uses: codecov/codecov-action@v4

      - name: Archiver rapport de couverture
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-production-${{ github.sha }}
          path: coverage/
          retention-days: 30

  # ── 4. AUDIT DE SÉCURITÉ COMPLET ──────────────────────────────────────
  security-full:
    name: 🔒 Audit de sécurité complet
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: NPM Audit (deps de production)
        # xlsx HIGH + next HIGH sans fix upstream — continue-on-error temporaire
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: true

      - name: Rapport complet des vulnérabilités (informatif)
        run: |
          echo "========================================"
          echo "⚠️  Vulnérabilités HIGH sans correctif :"
          echo "  • xlsx  → GHSA-4r6h-8v6p-xvw6"
          echo "  • next  → GHSA-q4gf-8mx6-v5v3"
          echo "========================================"
          npm audit 2>&1 || true

      - name: Revue des dépendances modifiées (PR uniquement)
        uses: actions/dependency-review-action@v4
        if: github.event_name == 'pull_request'
        with:
          fail-on-severity: moderate
          # Exceptions pour les vulns sans correctif connu
          allow-ghsas: GHSA-4r6h-8v6p-xvw6,GHSA-5pgg-2g8v-p4x9,GHSA-q4gf-8mx6-v5v3

      - name: Détection de secrets (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

      - name: Vérification OWASP des dépendances
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'lbs-callcenter'
          path: '.'
          format: 'HTML'
          args: >
            --failOnCVSS 9
            --enableRetired
            --suppression owasp-suppressions.xml

      - name: Archiver le rapport OWASP
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-report-${{ github.sha }}
          path: reports/
          retention-days: 30

  # ── 5. BUILD DE PRODUCTION AVEC CACHE ────────────────────────────────
  build-production:
    name: 🏗️ Build de production
    runs-on: ubuntu-latest
    needs: [quality, unit-tests, validate-env, security-full]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Restaurer le cache Next.js
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-prod-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**/*.{ts,tsx,css}') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-prod-${{ hashFiles('package-lock.json') }}-
            ${{ runner.os }}-nextjs-prod-

      - run: npm ci

      - name: Build Next.js (production — sans rimraf)
        run: npx next build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: 1

      - name: Statistiques du bundle de production
        run: |
          echo "=== Taille du build de production ==="
          du -sh .next/ 2>/dev/null || true
          echo ""
          echo "=== Chunks JS les plus lourds ==="
          find .next/static/chunks -name "*.js" -exec du -sh {} \; 2>/dev/null \
            | sort -rh | head -15 || true

      - name: Archiver les artefacts de build
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build-${{ github.sha }}
          path: .next/
          retention-days: 1

  # ── 6. TESTS E2E PRÉ-PRODUCTION (sur PR uniquement) ──────────────────
  e2e-pre-production:
    name: 🎭 Tests E2E (pré-production contre staging)
    runs-on: ubuntu-latest
    needs: build-production
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Installer tous les navigateurs Playwright
        run: npx playwright install --with-deps

      - name: Exécuter la suite E2E complète contre staging
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

      - name: Archiver le rapport Playwright
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-pre-production-${{ github.sha }}
          path: playwright-report/
          retention-days: 14

  # ── 7. AUDIT LIGHTHOUSE (sur PR uniquement) ───────────────────────────
  lighthouse:
    name: 📊 Lighthouse Performance
    runs-on: ubuntu-latest
    needs: build-production
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Exécuter Lighthouse CI contre staging
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            ${{ secrets.NEXT_PUBLIC_APP_URL }}
            ${{ secrets.NEXT_PUBLIC_APP_URL }}/login
          budgetPath: ./.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

  # ── 8. DÉPLOIEMENT EN PRODUCTION (sur push main uniquement) ──────────
  deploy-production:
    name: 🚀 Déploiement Production (Vercel)
    runs-on: ubuntu-latest
    needs: build-production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      deploy_url: ${{ steps.vercel.outputs.deploy_url }}
      deploy_status: ${{ steps.vercel.outputs.deploy_status }}
    steps:
      - uses: actions/checkout@v4

      - name: Installer Vercel CLI
        run: npm install -g vercel@latest

      - name: Déployer en production sur Vercel
        id: vercel
        run: |
          echo "🚀 Démarrage du déploiement de production..."
          DEPLOY_OUTPUT=$(vercel deploy --prod \
            --token ${{ secrets.VERCEL_TOKEN }} \
            --yes \
            2>&1)
          echo "$DEPLOY_OUTPUT"
          DEPLOY_URL=$(echo "$DEPLOY_OUTPUT" | grep "https://" | grep -v "Inspect" | tail -1)
          echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "deploy_status=success" >> $GITHUB_OUTPUT
          echo "✅ URL de production : $DEPLOY_URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ── 9. SMOKE TESTS POST-DÉPLOIEMENT PRODUCTION ────────────────────────
  smoke-test-production:
    name: 💨 Smoke Tests Production
    runs-on: ubuntu-latest
    needs: deploy-production
    if: needs.deploy-production.outputs.deploy_status == 'success'
    steps:
      - name: Attendre la stabilisation du déploiement (max 5min)
        run: |
          URL="${{ secrets.NEXT_PUBLIC_APP_URL }}"
          echo "Surveillance de : $URL"
          for i in {1..20}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" 2>/dev/null || echo "000")
            echo "Tentative $i/20 — HTTP $STATUS"
            if [[ "$STATUS" == "200" || "$STATUS" == "301" || "$STATUS" == "308" ]]; then
              echo "✅ Production disponible"
              break
            fi
            if [ $i -eq 20 ]; then
              echo "❌ Production non disponible après 5 minutes"
              exit 1
            fi
            sleep 15
          done

      - name: Health check — Page d'accueil
        run: |
          URL="${{ secrets.NEXT_PUBLIC_APP_URL }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          echo "/ → HTTP $STATUS"
          [[ "$STATUS" == "200" || "$STATUS" == "308" ]] || { echo "❌ Homepage inaccessible"; exit 1; }

      - name: Health check — Page de login
        run: |
          URL="${{ secrets.NEXT_PUBLIC_APP_URL }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/login")
          echo "/login → HTTP $STATUS"
          [ "$STATUS" = "200" ] || { echo "❌ /login inaccessible en production"; exit 1; }

      - name: Health check — API auth accessible
        run: |
          URL="${{ secrets.NEXT_PUBLIC_APP_URL }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/api/auth/session")
          echo "/api/auth/session → HTTP $STATUS"
          [ "$STATUS" != "000" ] || { echo "❌ API auth non accessible"; exit 1; }

      - name: Vérifier les headers de sécurité
        run: |
          URL="${{ secrets.NEXT_PUBLIC_APP_URL }}"
          HEADERS=$(curl -sI "$URL")
          echo "$HEADERS"
          echo "$HEADERS" | grep -qi "x-frame-options" \
            && echo "✅ X-Frame-Options présent" \
            || echo "⚠️  X-Frame-Options manquant"
          echo "$HEADERS" | grep -qi "x-content-type-options" \
            && echo "✅ X-Content-Type-Options présent" \
            || echo "⚠️  X-Content-Type-Options manquant"

  # ── 10. NOTIFICATION FINALE ───────────────────────────────────────────
  notify:
    name: 📣 Notification de déploiement
    runs-on: ubuntu-latest
    needs: [deploy-production, smoke-test-production]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Résumé du déploiement dans GitHub Actions
        run: |
          if [[ "${{ needs.smoke-test-production.result }}" == "success" ]]; then
            echo "## ✅ Déploiement en production réussi" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Étape | Statut |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|" >> $GITHUB_STEP_SUMMARY
            echo "| 🔍 Qualité du code | ✅ |" >> $GITHUB_STEP_SUMMARY
            echo "| 🧪 Tests unitaires | ✅ |" >> $GITHUB_STEP_SUMMARY
            echo "| 🔒 Audit sécurité | ✅ |" >> $GITHUB_STEP_SUMMARY
            echo "| 🏗️ Build | ✅ |" >> $GITHUB_STEP_SUMMARY
            echo "| 🚀 Déploiement Vercel | ✅ |" >> $GITHUB_STEP_SUMMARY
            echo "| 💨 Smoke Tests | ✅ |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Commit :** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
            echo "**Déployé par :** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Échec du déploiement en production" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Commit :** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
            echo "**Auteur :** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Procédure de rollback" >> $GITHUB_STEP_SUMMARY
            echo "1. Aller sur le dashboard Vercel" >> $GITHUB_STEP_SUMMARY
            echo "2. Sélectionner le dernier déploiement stable" >> $GITHUB_STEP_SUMMARY
            echo "3. Cliquer sur « Promote to Production »" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
