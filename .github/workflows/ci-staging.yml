name: CI/CD — Staging

on:
  pull_request:
    branches: [staging]
  push:
    branches: [staging]

concurrency:
  group: ci-staging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. QUALITÉ DU CODE ────────────────────────────────────────────────
  quality:
    name: 🔍 Qualité du code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run type-check
      - run: npm run lint
      - run: npm run format:check

  # ── 2. VALIDATION DES VARIABLES D'ENVIRONNEMENT ───────────────────────
  validate-env:
    name: 🔐 Variables d'environnement
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Vérifier tous les secrets staging
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          MISSING=0
          for VAR in DATABASE_URL SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY AUTH_SECRET \
                     COHERE_API_KEY OPENAI_API_KEY VERCEL_PROJECT_ID; do
            if [ -z "${!VAR}" ]; then
              echo "❌ Secret manquant : $VAR"
              MISSING=1
            else
              echo "✅ $VAR"
            fi
          done
          [ $MISSING -eq 0 ] || exit 1

  # ── 3. TESTS UNITAIRES + COUVERTURE ──────────────────────────────────
  unit-tests:
    name: 🧪 Tests unitaires (couverture > 70%)
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Exécuter les tests avec couverture
        run: npm run test:ci
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEXT_TELEMETRY_DISABLED: 1

      - uses: codecov/codecov-action@v4

      - name: Archiver le rapport de couverture
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-staging
          path: coverage/
          retention-days: 7

  # ── 4. AUDIT DE SÉCURITÉ ─────────────────────────────────────────────
  security:
    name: 🔒 Audit de sécurité
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: NPM Audit (deps de production uniquement)
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: true

      - name: Résumé des vulnérabilités non corrigeables
        run: |
          echo "⚠️  HIGH sans fix : next (GHSA-q4gf-8mx6-v5v3) + xlsx (GHSA-4r6h-8v6p-xvw6)"
          npm audit --audit-level=high 2>&1 | grep -E "(high|critical)" || true

      - name: Détection de secrets (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

  # ── 5. BUILD NEXT.JS AVEC CACHE ──────────────────────────────────────
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: [quality, unit-tests, validate-env, security]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Restaurer le cache Next.js
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-staging-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**/*.{ts,tsx,css}') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-staging-${{ hashFiles('package-lock.json') }}-
            ${{ runner.os }}-nextjs-staging-

      - run: npm ci

      - name: Build Next.js (CI — sans rimraf)
        run: npx next build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_TELEMETRY_DISABLED: 1

      - name: Statistiques du bundle
        run: |
          echo "=== Taille du build ==="
          du -sh .next/ 2>/dev/null || true
          find .next/static/chunks -name "*.js" -exec du -sh {} \; 2>/dev/null | sort -rh | head -10 || true

  # ── 6. DÉPLOIEMENT STAGING (Vercel) ──────────────────────────────────
  deploy-staging:
    name: 🚀 Déploiement Staging (Vercel)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    outputs:
      deploy_url: ${{ steps.vercel.outputs.deploy_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Installer Vercel CLI
        run: npm install -g vercel@latest

      - name: Déployer sur Vercel (preview staging)
        id: vercel
        run: |
          DEPLOY_URL=$(vercel deploy \
            --yes \
            2>&1 | grep "https://" | grep -v "Inspect" | tail -1)
          echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "✅ URL de déploiement : $DEPLOY_URL"
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ── 7. SMOKE TESTS POST-DÉPLOIEMENT ──────────────────────────────────
  smoke-test:
    name: 💨 Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: needs.deploy-staging.outputs.deploy_url != ''
    steps:
      - name: Attendre la disponibilité du déploiement (max 3min)
        run: |
          URL="${{ needs.deploy-staging.outputs.deploy_url }}"
          echo "Surveillance de : $URL"
          for i in {1..12}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" 2>/dev/null || echo "000")
            echo "Tentative $i/12 — HTTP $STATUS"
            if [[ "$STATUS" == "200" || "$STATUS" == "301" || "$STATUS" == "308" ]]; then
              echo "✅ Déploiement disponible"
              break
            fi
            if [ $i -eq 12 ]; then
              echo "❌ Déploiement non disponible après 3 minutes"
              exit 1
            fi
            sleep 15
          done

      - name: Health check — Page d'accueil
        run: |
          URL="${{ needs.deploy-staging.outputs.deploy_url }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          echo "/ → HTTP $STATUS"
          [[ "$STATUS" == "200" || "$STATUS" == "308" ]] || { echo "❌ Page d'accueil inaccessible"; exit 1; }

      - name: Health check — Page de login
        run: |
          URL="${{ needs.deploy-staging.outputs.deploy_url }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/login")
          echo "/login → HTTP $STATUS"
          [ "$STATUS" = "200" ] || { echo "❌ /login inaccessible"; exit 1; }

      - name: Health check — Redirection dashboard (non authentifié)
        run: |
          URL="${{ needs.deploy-staging.outputs.deploy_url }}"
          # Doit rediriger vers /login si non authentifié
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L "$URL/dashboard")
          echo "/dashboard (non auth) → HTTP $STATUS"
          [ "$STATUS" = "200" ] || { echo "❌ /dashboard ne répond pas correctement"; exit 1; }

  # ── 8. TESTS E2E ──────────────────────────────────────────────────────
  e2e-tests:
    name: 🎭 Tests E2E
    runs-on: ubuntu-latest
    needs: [smoke-test, deploy-staging]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Installer les navigateurs Playwright
        run: npx playwright install --with-deps chromium

      - name: Exécuter les tests E2E contre l'URL staging
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.deploy-staging.outputs.deploy_url || secrets.NEXT_PUBLIC_APP_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}

      - name: Archiver le rapport Playwright
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-staging
          path: playwright-report/
          retention-days: 7

  # ── 9. COMMENTER L'URL SUR LA PR ──────────────────────────────────────
  comment-pr-url:
    name: 💬 Commentaire URL sur PR
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'pull_request'
    steps:
      - name: Trouver l'URL Vercel Preview (PR)
        id: vercel-pr
        run: |
          npm install -g vercel@latest
          DEPLOY_URL=$(vercel deploy \
            --yes \
            2>&1 | grep "https://" | grep -v "Inspect" | tail -1)
          echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Poster le commentaire de déploiement sur la PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.vercel-pr.outputs.deploy_url }}'
            const body = [
              '## 🚀 Preview de déploiement disponible',
              '',
              `**URL :** ${url}`,
              '',
              '| Vérification | Statut |',
              '|---|---|',
              '| 🔍 Type-check | ✅ |',
              '| 🧪 Tests unitaires | ✅ |',
              '| 🏗️ Build Next.js | ✅ |',
              '',
              '_Ce commentaire est mis à jour à chaque push._'
            ].join('\n')
            // Chercher un commentaire existant à mettre à jour
            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            })
            const existing = comments.data.find(c => c.body.includes('Preview de déploiement disponible'))
            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body
              })
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body
              })
            }
