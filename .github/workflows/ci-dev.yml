name: CI — Dev Branch

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

# Annule les runs en cours sur la même branche pour éviter les conflits
concurrency:
  group: ci-dev-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. QUALITÉ DU CODE ─────────────────────────────────────────────────
  quality:
    name: 🔍 Qualité du code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installer les dépendances
        run: npm ci

      - name: Vérification TypeScript
        run: npm run type-check

      - name: Lint ESLint
        run: npm run lint

      - name: Vérification formatage Prettier
        run: npm run format:check

  # ── 2. VALIDATION DES VARIABLES D'ENVIRONNEMENT ────────────────────────
  validate-env:
    name: 🔐 Variables d'environnement
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Vérifier que tous les secrets sont configurés
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          MISSING=0
          for VAR in DATABASE_URL SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY AUTH_SECRET GOOGLE_API_KEY ANTHROPIC_API_KEY; do
            if [ -z "${!VAR}" ]; then
              echo "❌ Secret manquant dans GitHub Actions : $VAR"
              MISSING=1
            else
              echo "✅ $VAR"
            fi
          done
          if [ $MISSING -ne 0 ]; then
            echo ""
            echo "Configurer les secrets manquants dans :"
            echo "GitHub → Settings → Secrets and variables → Actions"
            exit 1
          fi

  # ── 3. TESTS UNITAIRES ─────────────────────────────────────────────────
  unit-tests:
    name: 🧪 Tests unitaires
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installer les dépendances
        run: npm ci

      - name: Exécuter les tests avec couverture
        run: npm run test:ci
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEXT_TELEMETRY_DISABLED: 1

      - name: Upload rapport de couverture (Codecov)
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false

      - name: Publier résumé des tests dans GitHub Actions
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-dev
          path: coverage/
          retention-days: 5

  # ── 4. AUDIT DE SÉCURITÉ ───────────────────────────────────────────────
  security:
    name: 🔒 Audit de sécurité
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installer les dépendances
        run: npm ci

      - name: NPM Audit (deps de production)
        # xlsx (HIGH, GHSA-4r6h-8v6p-xvw6) + next (HIGH) sans fix upstream — continue-on-error temporaire
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: true

      - name: Résumé des vulnérabilités connues non corrigeables
        run: |
          echo "========================================"
          echo "⚠️  Vulnérabilités HIGH sans correctif :"
          echo "  • xlsx  → GHSA-4r6h-8v6p-xvw6 (Prototype Pollution)"
          echo "  • next  → GHSA-q4gf-8mx6-v5v3 (DoS) — attendre patch stable"
          echo "  Action : remplacer xlsx par exceljs (backlog)"
          echo "========================================"
          npm audit --audit-level=high 2>&1 | grep -E "^(│|┌|└|├|high|critical)" || true

      - name: Détection de secrets dans le code (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

  # ── 5. BUILD NEXT.JS ──────────────────────────────────────────────────
  build:
    name: 🏗️ Build de vérification
    runs-on: ubuntu-latest
    needs: [quality, unit-tests, validate-env]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Restaurer le cache Next.js (.next/cache)
        uses: actions/cache@v4
        with:
          path: .next/cache
          # Invalide le cache si package-lock.json ou les sources changent
          key: ${{ runner.os }}-nextjs-dev-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**/*.{ts,tsx,css}') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-dev-${{ hashFiles('package-lock.json') }}-
            ${{ runner.os }}-nextjs-dev-

      - name: Installer les dépendances
        run: npm ci

      - name: Build Next.js (CI — sans rimraf car env propre)
        # Utilise `npx next build` au lieu de `npm run build` pour éviter le rimraf
        # qui supprimerait le cache restauré ci-dessus
        run: npx next build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_TELEMETRY_DISABLED: 1

      - name: Statistiques du bundle
        run: |
          echo "=== Taille du build Next.js ==="
          du -sh .next/ 2>/dev/null || true
          echo ""
          echo "=== Chunks JS les plus lourds ==="
          find .next/static/chunks -name "*.js" -exec du -sh {} \; 2>/dev/null \
            | sort -rh | head -10 || true
